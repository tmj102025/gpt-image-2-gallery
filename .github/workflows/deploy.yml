name: Deploy on Push

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.60.110.128
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: bash /opt/deploy-gpt-image-2.sh

name: Update Prompts Daily

on:
  schedule:
    - cron: '0 0 * * *'   # ทุกวัน เที่ยงคืน UTC (7:00 ไทย)
  workflow_dispatch:        # กดรัน manual ได้จาก GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gallery repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone source repos
        run: |
          git clone --depth 1 https://github.com/YouMind-OpenLab/awesome-gpt-image-2.git ../awesome-gpt-image-2
          git clone --depth 1 https://github.com/ZeroLu/awesome-gpt-image.git ../awesome-gpt-image
          git clone --depth 1 https://github.com/wuyoscar/gpt_image_2_skill.git ../gpt_image_2_skill

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Parse all repos → prompts.json
        run: npm run parse

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/prompts.json
          if git diff --staged --quiet; then
            echo "No changes — prompts up to date"
          else
            git commit -m "update prompts $(date '+%Y-%m-%d')"
            git push
          fi

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.60.110.128
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: bash /opt/deploy-gpt-image-2.sh
